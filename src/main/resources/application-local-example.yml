spring:
  datasource:
    url: {{DB_URL}}
    username: {{DB_USERNAME}}
    password: {{DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        redirect-front-uri: {{REDIRECT_FRONT_URI}}
        registration:

          # 네이버 로그인 설정
          naver:
            client-id: {{NAVER_CLIENT_ID}} # 네이버 클라이언트 ID
            client-secret: {{NAVER_CLIENT_SECRET}} # 네이버 클라이언트 시크릿
            authorization-grant-type: authorization_code
            redirect-uri: {{redirect-uri}}
            scope:
              - name           # 회원이름
              - email          # 연락처 이메일 주소
              - profile_image  # 프로필 사진
              - gender         # 성별 (F: 여성, M: 남성, U: 확인불가)
              - birthday       # 생일 (MM-DD 형식)
              - birthyear      # 출생연도 (YYYY 형식)
            client-name: Naver


        provider:
          # 네이버 서버 주소록
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # 🚨 매우 중요: 네이버는 반드시 'response'로 설정해야 합니다!
            user-name-attribute: response
jwt:
  # HS256 알고리즘을 사용하려면 시크릿 키는 반드시 256비트(32바이트) 이상의 길이여야 합니다.
  # 아래는 "this-is-a-very-secure-secret-key-for-gonggomoon-project-jwt-test"를 Base64로 인코딩한 예시입니다.
  # 실무에서는 이 값을 Github에 올리지 않고 환경 변수(ENV)로 주입받아야 합니다!
  secret: {{JWT_SECRET_KEY}}
  access-token-validity-in-seconds: {{ACCESS_TOKEN_VALIDITY_IN_SECONDS}}
  refresh-token-validity-in-seconds: {{REFRESH_TOKEN_VALIDITY_IN_SECONDS}}

app:
  cookie:
    secure: false # 개발 환경에서는 false, 운영 환경에서는 true로 설정하세요.
    http-only: true
    same-site: lax # 프론트/백엔드가 같은 localhost면 Lax로 테스트 가능

  s3:
    bucket: ggm-user-uploads-prod
    region: ap-northeast-2
    # 넣는 방식 예시) 상단 Edit Configurations -> Environment variables에서 실제 값 넣어주기
    # ex)S3_ACCESS_KEY=...;S3_SECRET_KEY=...
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

strategy:
  portfolio:
    daily-limit-enabled: true # 개발 환경에서는 false, 운영 환경에서는 true로 설정하세요.