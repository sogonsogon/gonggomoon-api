spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        redirect-front-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_REDIRECT_FRONT_URI}
        registration:

          naver:
            client-id: ${NAVER_CLIENT_ID} # 네이버 클라이언트 ID
            client-secret: ${NAVER_CLIENT_SECRET} # 네이버 클라이언트 시크릿
            authorization-grant-type: authorization_code
            redirect-uri: ${NAVER_REDIRECT_URI}
            scope:
              - name           # 회원이름
              - email          # 연락처 이메일 주소
              - profile_image  # 프로필 사진
              - gender         # 성별 (F: 여성, M: 남성, U: 확인불가)
              - birthday       # 생일 (MM-DD 형식)
              - birthyear      # 출생연도 (YYYY 형식)
            client-name: Naver

        provider:

          # 네이버 서버 주소록
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-validity-in-seconds: ${ACCESS_TOKEN_VALIDITY_IN_SECONDS}
  refresh-token-validity-in-seconds: ${REFRESH_TOKEN_VALIDITY_IN_SECONDS}

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://gonggommon.com
      - http://gonggommon.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Set-Cookie
      - Authorization
    allow-credentials: true
    max-age: 3600
  s3:
    bucket: ${S3_BUCKET}
    region: ${S3_REGION}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    endpoint: ${S3_ENDPOINT}
  file:
    storage-type: ${FILE_STORAGE_TYPE} # s3 || gcs
  cookie:
    secure: true # 개발 환경에서는 false, 운영 환경에서는 true로 설정하세요.
    http-only: true
    same-site: lax # 프론트/백엔드가 같은 localhost면 Lax로 테스트 가능

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

ai:
  server:
    base-url: ${AI_SERVER_URL}
    internal-api-key: ${INTERNAL_API_KEY}

strategy:
  portfolio:
    weekly-limit-enabled: ${PORTFOLIO_WEEKLY_LIMIT_ENABLED}
  interview:
    weekly-limit-enabled: ${INTERVIEW_WEEKLY_LIMIT_ENABLED}

experience:
  extraction:
    weekly-limit-enabled: ${EXPERIENCE_EXTRACTION_WEEKLY_LIMIT_ENABLED}