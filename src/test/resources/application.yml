spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        redirect-front-uri: "http://localhost:3000/auth/callback"
        registration:
          naver:
            client-id: test-client-id
            client-secret: test-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
              - gender
              - birthday
              - birthyear
            client-name: Naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWdvbmdnb21vb24tcHJvamVjdC1qd3QtdGVzdA==
  access-token-validity-in-seconds: 1800
  refresh-token-validity-in-seconds: 1209600

app:
  s3:
    bucket: test-bucket
    region: ap-northeast-2
    access-key: test-access-key
    secret-key: test-secret-key
    endpoint: https://example
  cookie:
    secure: false
    http-only: true
    same-site: lax
  file:
    storage-type: s3

ai:
  server:
    base-url: http://localhost:8000
    internal-api-key: "test-internal-api-key"

