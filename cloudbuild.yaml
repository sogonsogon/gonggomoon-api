steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gonggomoon-api'
      - '-f'
      - 'Dockerfile.dev'
      - '.'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gonggomoon-api'

options:
  logging: CLOUD_LOGGING_ONLY